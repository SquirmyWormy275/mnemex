name: JSONL Export

# Nightly export of canonical chopping results from Supabase to a JSONL
# snapshot. Snapshots land on the `data` orphan branch; main is never
# touched. See data/README.md for the consumer-side contract.
#
# Schedule:
#   Daily at 07:00 UTC: rolling 7-day window
#   Sundays at 07:00 UTC: full snapshot
#
# Required secrets (set in repo Settings > Secrets and variables > Actions):
#   MNEMEX_SUPABASE_URL
#   MNEMEX_SUPABASE_SERVICE_ROLE_KEY
#
# These are the production project's credentials. Never paste them into
# Claude.ai chat. See docs/supabase-setup.md.

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  workflow_dispatch:       # also runnable on demand

permissions:
  contents: write          # required to push to the data/ branch

concurrency:
  group: jsonl-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Determine snapshot mode
        id: mode
        run: |
          # Sunday (day 0) = full snapshot; otherwise rolling 7-day window.
          # Manual workflow_dispatch is treated as a full snapshot to give
          # the operator a complete refresh on demand.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%u)" = "7" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "since=" >> "$GITHUB_OUTPUT"
          else
            echo "mode=rolling" >> "$GITHUB_OUTPUT"
            echo "since=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          fi
          echo "snapshot_date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install MNEMEX
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Export canonical results to JSONL
        env:
          MNEMEX_SUPABASE_URL: ${{ secrets.MNEMEX_SUPABASE_URL }}
          MNEMEX_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MNEMEX_SUPABASE_SERVICE_ROLE_KEY }}
          SNAPSHOT_DATE: ${{ steps.mode.outputs.snapshot_date }}
          SNAPSHOT_SINCE: ${{ steps.mode.outputs.since }}
          SNAPSHOT_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          mkdir -p _export
          python - <<'PY'
          import os
          from mnemex.store import export_canonical_jsonl
          since = os.environ.get("SNAPSHOT_SINCE") or None
          date = os.environ["SNAPSHOT_DATE"]
          mode = os.environ["SNAPSHOT_MODE"]
          out = f"_export/canonical-{date}.jsonl"
          count = export_canonical_jsonl(out, since=since)
          print(f"Wrote {count} rows to {out} (mode={mode}, since={since!r})")
          PY

      - name: Configure git identity
        run: |
          git config user.name  "mnemex-bot"
          git config user.email "mnemex-bot@users.noreply.github.com"

      - name: Push snapshot to data/ branch
        env:
          SNAPSHOT_DATE: ${{ steps.mode.outputs.snapshot_date }}
          SNAPSHOT_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          # Save the export aside before we touch the working tree.
          mv _export "$RUNNER_TEMP/_export_staged"

          # Switch to (or create) the orphan data branch.
          if git ls-remote --heads origin data | grep -q data; then
            git fetch origin data:data
            git checkout data
            # Replace with a clean working tree from the data branch.
            git reset --hard data
          else
            git checkout --orphan data
            git rm -rf . > /dev/null 2>&1 || true
            cp data/README.md ./README.md 2>/dev/null || true
          fi

          # Place the snapshot file at the branch root.
          mv "$RUNNER_TEMP/_export_staged"/* .
          rmdir "$RUNNER_TEMP/_export_staged"

          # Stage and commit.
          git add "canonical-${SNAPSHOT_DATE}.jsonl"
          git commit -m "data: snapshot ${SNAPSHOT_DATE} (${SNAPSHOT_MODE})"

          # Push to the data branch (no force; standard fast-forward).
          git push origin data
